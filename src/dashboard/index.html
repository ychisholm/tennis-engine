<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Engine · Matches</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter+Tight:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter Tight',system-ui,sans-serif;
  background:#f4ead8;color:#2b1d15;
  --bg:#f4ead8;--bg-2:#ecdfc5;--card:#fbf4e2;
  --clay:#c85a33;--clay-dark:#9a3f20;
  --ink:#2b1d15;--ink-2:#5a4234;--ink-3:#8a6e5a;
  --rule:#d9c6a8;--rule-soft:rgba(43,29,21,.12);--chalk:#fbf4e2;
  --edge:#4a7c3a;--edge-neu:#c69322;--edge-neg:#c85a33;
}
@keyframes pulseDot{0%{opacity:1}50%{opacity:0.35}100%{opacity:1}}
@keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(200,90,51,.5)}70%{box-shadow:0 0 0 6px rgba(200,90,51,0)}100%{box-shadow:0 0 0 0 rgba(200,90,51,0)}}
@keyframes edgeFlash{0%,100%{opacity:1}50%{opacity:0.55}}

/* ── TOP NAV ──────────────────────────────────────────────────── */
.top-nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;gap:0;
  background:var(--bg);border-bottom:2px solid var(--clay);
  padding:0 28px;height:52px;
}
.nav-brand{
  font-family:'Cormorant Garamond',serif;font-weight:600;font-style:italic;
  font-size:1.15rem;color:var(--ink);display:flex;align-items:center;gap:9px;
  flex-shrink:0;
}
.nav-brand .emblem{
  width:24px;height:24px;border-radius:50%;background:var(--clay);
  color:var(--chalk);font-size:0.9rem;display:flex;align-items:center;justify-content:center;
  font-weight:600;flex-shrink:0;font-family:'Inter Tight',sans-serif;font-style:normal;
}
.nav-tabs{display:flex;gap:2px;margin-left:auto;align-items:center;}
.nav-tab{
  font-family:'Inter Tight',sans-serif;font-size:0.78rem;font-weight:600;
  padding:7px 16px;border-radius:999px;border:none;background:transparent;
  color:var(--ink-2);cursor:pointer;transition:all .15s;white-space:nowrap;
  letter-spacing:0.01em;
}
.nav-tab:hover{color:var(--ink);background:rgba(200,90,51,.08)}
.nav-tab.active{background:var(--ink);color:var(--chalk)}
.nav-tab.match-tab{
  background:rgba(200,90,51,.1);color:var(--clay-dark);border:1px solid rgba(200,90,51,.25);
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.85rem;font-weight:600;
}
.nav-tab.match-tab.active{background:var(--clay);color:var(--chalk);border-color:var(--clay)}
.live-badge{
  margin-left:14px;display:flex;align-items:center;gap:6px;
  font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--clay-dark);background:var(--chalk);border:1px solid rgba(200,90,51,.3);
  padding:4px 10px;border-radius:999px;flex-shrink:0;
}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--clay);animation:pulseDot 1.8s infinite;flex-shrink:0}

/* ── STAGE ────────────────────────────────────────────────────── */
.stage{position:fixed;inset:52px 0 0 0;overflow-y:auto;overflow-x:hidden;}

/* ── MATCHES PAGE ─────────────────────────────────────────────── */
.matches-page{max-width:1400px;margin:0 auto;padding:32px 16px 80px;position:relative}

/* Date hero */
.date-hero{
  position:relative;margin:4px 0 22px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.date-row{display:flex;align-items:center;gap:22px;}
.date-arrow{
  width:38px;height:38px;border-radius:50%;
  border:1px solid var(--rule);background:transparent;color:var(--ink-2);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .15s;font-size:1.25rem;line-height:1;
  font-family:'Inter Tight',sans-serif;
}
.date-arrow:hover{background:var(--ink);color:var(--chalk);border-color:var(--ink);transform:scale(1.04)}
.date-arrow:active{transform:scale(0.97)}
.date-display{text-align:center;min-width:380px;cursor:default;}
.date-eyebrow{
  font-size:0.62rem;font-weight:700;letter-spacing:0.22em;
  text-transform:uppercase;color:var(--clay-dark);margin-bottom:2px;
  font-family:'Inter Tight',sans-serif;
}
.date-eyebrow.other{color:var(--ink-3)}
.date-main{
  font-family:'Cormorant Garamond',serif;font-weight:500;font-style:italic;
  font-size:2.25rem;color:var(--ink);letter-spacing:-0.01em;line-height:1.1;
}
.date-jump{position:relative;margin-top:6px;}
.date-jump-trigger{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.82rem;
  color:var(--ink-3);background:none;border:none;cursor:pointer;
  padding:3px 10px;border-radius:999px;transition:all .12s;
  display:inline-flex;align-items:center;gap:5px;
}
.date-jump-trigger:hover{color:var(--clay-dark);background:rgba(200,90,51,.08)}
.date-jump-trigger svg{width:11px;height:11px;opacity:.7}
.date-jump input[type="date"]{
  position:absolute;top:100%;left:50%;transform:translateX(-50%);
  margin-top:6px;padding:6px 10px;border-radius:8px;
  border:1px solid var(--rule);background:var(--card);
  font-family:'Inter Tight',sans-serif;font-size:0.78rem;color:var(--ink);
  cursor:pointer;outline:none;display:none;
  box-shadow:0 6px 22px rgba(43,29,21,.12);
}
.date-jump.open input[type="date"]{display:block}
.date-jump input[type="date"]:focus{border-color:var(--clay)}

/* Filter toggle */
.filter-toggle-wrap{display:flex;justify-content:center;margin:18px 0 30px}
.filter-toggle{
  display:flex;justify-content:space-evenly;align-items:center;
  padding:3px;border-radius:999px;
  background:var(--bg-2);border:1px solid var(--rule);
  width:min(560px,100%);gap:4px;
}
.filter-toggle button{
  background:transparent;border:none;cursor:pointer;
  padding:6px 18px;font-family:'Inter Tight',sans-serif;
  font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--ink-2);border-radius:999px;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:7px;
  flex:1;white-space:nowrap;
}
.filter-toggle button:hover{color:var(--ink)}
.filter-toggle button.active{background:var(--ink);color:var(--chalk)}
.filter-toggle button .dot-live{
  width:6px;height:6px;border-radius:50%;background:var(--clay);
  animation:pulseDot 1.8s infinite;
}
.filter-toggle button.active .dot-live{background:var(--chalk)}
.filter-toggle .count{
  font-family:'IBM Plex Mono',monospace;font-size:0.6rem;font-weight:600;
  opacity:.65;margin-left:2px;letter-spacing:0;
}
.filter-toggle button.active .count{opacity:.7}

/* Section blocks */
.match-section{margin-bottom:44px;scroll-margin-top:80px}
.match-section.hidden{display:none}
.section-head{
  display:flex;align-items:baseline;gap:14px;
  margin-bottom:20px;padding-bottom:10px;
  border-bottom:1px solid var(--rule);
}
.section-title{
  font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.55rem;
  color:var(--ink);letter-spacing:-0.01em;
  display:flex;align-items:center;gap:10px;
  white-space:nowrap;flex-shrink:0;
}
.section-title .live-dot{width:9px;height:9px}
.section-count{
  font-family:'IBM Plex Mono',monospace;font-size:0.7rem;font-weight:600;
  color:var(--ink-3);letter-spacing:0.04em;
}
.section-blurb{
  margin-left:auto;font-size:0.78rem;color:var(--ink-3);
  font-family:'Cormorant Garamond',serif;font-style:italic;
}
.section-empty{
  padding:24px 22px;border:1px dashed var(--rule);border-radius:10px;
  background:rgba(217,198,168,.18);text-align:center;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:0.95rem;color:var(--ink-3);
}

/* Tour columns: ATP | WTA side-by-side */
.tour-cols{
  display:grid;grid-template-columns:1fr 1fr;gap:48px;
  align-items:start;
}
.tour-subsection{margin-bottom:0;min-width:0}
.tour-subsection:last-child{margin-bottom:0}
.tour-subhead{
  display:flex;align-items:center;gap:10px;
  margin-bottom:12px;
  font-size:0.66rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--ink-2);
}
.tour-subhead .tour-tag{
  padding:2px 9px;border-radius:999px;
  background:var(--ink);color:var(--chalk);
  font-size:0.6rem;font-weight:700;letter-spacing:0.12em;
}
.tour-subhead .tour-name{color:var(--ink-3);font-weight:600}
.tour-subhead .rule{flex:1;height:1px;background:var(--rule)}

.tournament-group{margin-bottom:14px}
.tournament-group:last-child{margin-bottom:0}
.tournament-label{
  font-size:0.62rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;
  color:var(--ink-3);margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
}
.surface-pill{
  display:inline-block;padding:1px 7px;border-radius:999px;font-size:0.58rem;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;background:rgba(200,90,51,.1);color:var(--clay-dark);
}

.match-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start;
}
.tour-empty{
  border:1px dashed var(--rule);border-radius:6px;
  padding:22px 16px;text-align:center;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:var(--ink-3);font-size:0.95rem;
  background:rgba(255,255,255,0.3);
}

/* ── MATCH CARD (compact, reduced horizontal padding) ────────── */
.match-card{
  background:var(--card);border:1px solid var(--rule);border-radius:10px;
  overflow:hidden;cursor:pointer;
  transition:box-shadow .15s,border-color .15s,transform .15s;
  position:relative;
}
.match-card:hover{box-shadow:0 4px 18px rgba(43,29,21,.1);border-color:rgba(200,90,51,.35);transform:translateY(-1px)}
.match-card:hover .card-status-time{text-decoration:underline}
.match-card.live::after{
  content:"";position:absolute;top:0;left:0;width:3px;height:100%;
  background:var(--clay);
}

.card-header-row{
  display:flex;align-items:center;justify-content:space-between;gap:6px;
  padding:6px 8px 4px;border-bottom:1px solid rgba(217,198,168,.6);
  min-height:24px;
}
.card-round{font-size:0.6rem;font-weight:600;letter-spacing:0.06em;color:var(--ink-3);text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.card-status-live{display:flex;align-items:center;gap:5px;font-size:0.66rem;font-weight:700;color:var(--clay-dark);flex-shrink:0}
.card-status-time{font-size:0.7rem;font-weight:600;color:var(--clay);text-decoration:none;cursor:pointer;flex-shrink:0}
.card-status-final{font-size:0.66rem;font-weight:600;letter-spacing:0.08em;color:var(--ink-3);text-transform:uppercase;flex-shrink:0}
.card-status-wo{font-size:0.66rem;font-weight:700;letter-spacing:0.08em;color:var(--ink-3);text-transform:uppercase;font-style:italic;flex-shrink:0}

.card-players{padding:6px 8px 8px;padding-left:14px;position:relative}
.player-row{
  display:flex;align-items:center;gap:6px;padding:4px 0;
  position:relative;min-height:28px;
}
.player-row.serving::before{
  content:"▶";font-size:0.5rem;color:var(--clay);position:absolute;left:-9px;
}
.player-flag{font-size:0.95rem;line-height:1;width:17px;flex-shrink:0}
.player-seed{font-size:0.6rem;font-weight:700;color:var(--ink-3);width:13px;text-align:center;flex-shrink:0}
.player-name{
  font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:500;
  color:var(--ink);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.player-name.winner{font-weight:700;color:var(--ink)}
.player-name.loser{color:var(--ink-2)}
.sets-area{display:flex;gap:1px;align-items:center;margin-left:auto;flex-shrink:0}
.set-score{
  font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:500;
  color:var(--ink-3);min-width:20px;text-align:center;font-variant-numeric:tabular-nums;
  position:relative;line-height:1;
}
.set-score.won{color:var(--ink);font-weight:700}
.set-score.live{color:var(--ink);background:rgba(200,90,51,.12);border-radius:4px;padding:0 3px}
.set-score sup{font-size:0.55rem;position:absolute;top:-4px;right:-2px;color:var(--ink-3)}
.pts-score{
  font-family:'IBM Plex Mono',monospace;font-size:0.85rem;font-weight:600;
  color:var(--clay);min-width:26px;text-align:center;margin-left:3px;
  font-variant-numeric:tabular-nums;
}
.upcoming-time-area{margin-left:auto;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.upcoming-time{
  font-family:'IBM Plex Mono',monospace;font-size:0.95rem;font-weight:600;
  color:var(--ink-2);letter-spacing:0.04em;
}
.wo-mark{
  font-size:0.72rem;color:var(--ink-3);font-style:italic;
  font-family:'Cormorant Garamond',serif;
}

/* ── DASHBOARD TAB (UNCHANGED — match detail view) ────────────── */
.dashboard-wrap{min-height:100%}
.dash-page{max-width:1320px;margin:0 auto;padding:24px 28px 60px}

.dash-crumb{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.88rem;
  color:var(--ink-3);margin-bottom:16px;cursor:pointer;display:inline-block;
  background:none;border:none;padding:0;
}
.dash-crumb:hover{color:var(--clay)}

/* Hero */
.dash-hero{
  background:var(--card);border:1px solid var(--rule);border-radius:12px;
  padding:18px 24px;margin-bottom:20px;position:relative;overflow:hidden;
}
.dash-hero::before{content:"";position:absolute;top:0;left:0;width:5px;bottom:0;background:var(--clay);border-radius:12px 0 0 12px}
.hero-meta-bar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  font-size:0.62rem;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;
  color:var(--ink-3);margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--rule);
}
.hero-meta-bar .tourn-tag{color:var(--clay)}
.hero-meta-dot{color:var(--rule);font-size:0.5rem}
.hero-live-badge{
  margin-left:auto;display:flex;align-items:center;gap:6px;font-size:0.62rem;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--clay-dark);
  background:var(--chalk);border:1px solid rgba(200,90,51,.3);padding:3px 9px;border-radius:999px;
}
.hero-frozen-badge{
  margin-left:8px;display:inline-flex;align-items:center;gap:6px;font-size:0.62rem;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;color:#8a6500;
  background:rgba(227,179,65,.12);border:1px solid rgba(227,179,65,.5);padding:3px 9px;border-radius:999px;
}
.hero-score-row{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.hero-score-tbl{border-collapse:collapse}
.hero-score-tbl th{font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;color:var(--ink-3);padding:2px 5px;text-align:center}
.hero-score-tbl th.th-name{text-align:left}
.hero-score-tbl td{padding:5px 5px}
.h-name{
  font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:500;
  color:var(--ink);white-space:nowrap;display:flex;align-items:center;gap:8px;
}
.h-serve{width:9px;height:9px;border-radius:50%;background:var(--clay);display:inline-block;flex-shrink:0}
.h-serve-sp{width:9px;display:inline-block;flex-shrink:0}
.h-set{
  font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:500;
  text-align:center;width:32px;color:var(--ink-3);font-variant-numeric:tabular-nums;
}
.h-set.won{color:var(--ink);font-weight:700}
.h-set.live{color:var(--ink);background:rgba(200,90,51,.12);border-radius:6px}
.h-pts{
  font-family:'IBM Plex Mono',monospace;font-size:1.1rem;font-weight:600;
  color:var(--clay);text-align:center;width:40px;font-variant-numeric:tabular-nums;
}
.hero-divider{width:1px;height:52px;background:var(--rule);flex-shrink:0}
.hero-probs{display:flex;gap:28px;align-items:center;margin-left:auto}
.hero-prob-item{text-align:center}
.hp-label{font-size:0.57rem;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;color:var(--ink-3);margin-bottom:3px}
.hp-val{
  font-family:'IBM Plex Mono',monospace;font-size:1.55rem;font-weight:600;
  letter-spacing:-0.03em;font-variant-numeric:tabular-nums;line-height:1;
}
.hp-val.a{color:var(--ink)}
.hp-val.b{color:var(--clay)}
.hp-val.edge{color:var(--edge)}
.hp-val.edge.neg{color:var(--edge-neg)}
.hp-val.edge.alerting{animation:edgeFlash 0.9s ease-in-out infinite}
.hp-sub{font-size:0.57rem;color:var(--ink-3);font-weight:500;margin-top:2px}
.hero-toggle{display:flex;padding:3px;border-radius:999px;background:var(--bg-2);margin-left:18px}
.hero-toggle button{
  background:transparent;border:none;padding:4px 13px;font-family:'Inter Tight',sans-serif;
  font-weight:600;font-size:0.7rem;cursor:pointer;border-radius:999px;color:var(--ink-2);
}
.hero-toggle button.active{background:var(--ink);color:var(--chalk)}

/* Momentum slim */
.dash-mom{
  background:var(--card);border:1px solid var(--rule);border-radius:12px;
  padding:14px 24px;margin-bottom:20px;
}
.mom-row-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.mom-player-a{font-size:0.72rem;font-weight:700;color:var(--ink);letter-spacing:0.02em}
.mom-player-b{font-size:0.72rem;font-weight:700;color:var(--clay);letter-spacing:0.02em}
.mom-center-lbl{font-size:0.72rem;font-weight:600;color:var(--ink-3);font-family:'Cormorant Garamond',serif;font-style:italic}
.mom-bar{height:5px;border-radius:999px;background:var(--rule);position:relative;overflow:visible}
.mom-fill-a{position:absolute;right:50%;top:0;height:100%;border-radius:999px 0 0 999px;background:var(--ink);transition:width .4s}
.mom-fill-b{position:absolute;left:50%;top:0;height:100%;border-radius:0 999px 999px 0;background:var(--clay);transition:width .4s}
.mom-tick{position:absolute;top:-4px;left:50%;width:2px;height:13px;transform:translateX(-50%);border-radius:2px;background:var(--ink-3);z-index:2}

/* Dashboard row layout */
.dash-row{display:grid;grid-template-columns:1.6fr 1fr;gap:20px;margin-bottom:20px}
.dash-row-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.dash-card{background:var(--card);border:1px solid var(--rule);border-radius:12px;padding:20px 22px}
.dash-card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.dash-sec-lbl{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.25rem;color:var(--ink)}
.dash-toggle{display:flex;padding:3px;border-radius:999px;background:var(--bg-2)}
.dash-toggle button{
  background:transparent;border:none;padding:4px 13px;font-family:'Inter Tight',sans-serif;
  font-weight:600;font-size:0.7rem;cursor:pointer;border-radius:999px;color:var(--ink-2);
}
.dash-toggle button.active{background:var(--ink);color:var(--chalk)}

/* Chart */
.chart-wrap{position:relative}
.chart-empty{padding:40px 0;text-align:center;color:var(--ink-3);font-family:'Cormorant Garamond',serif;font-style:italic}

/* Recharts overrides */
.recharts-cartesian-grid line{stroke:var(--rule)!important}
.recharts-cartesian-axis-tick-value{fill:var(--ink-3)!important;font-family:'Cormorant Garamond',serif!important;font-style:italic;font-size:11px}
.recharts-default-legend{font-family:'Inter Tight',sans-serif;font-size:0.7rem!important}
.recharts-tooltip-wrapper{outline:none}

/* Signals */
.sig-names{display:grid;grid-template-columns:36px 1fr 48px 1fr 36px;gap:8px;margin-bottom:6px;padding-bottom:8px;border-bottom:1px solid var(--rule)}
.sig-na{font-size:0.62rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-2);text-align:right}
.sig-nb{font-size:0.62rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--clay)}
.sig-row-d{display:grid;grid-template-columns:36px 1fr 48px 1fr 36px;align-items:center;gap:8px;padding:12px 0;border-bottom:1px solid var(--rule)}

</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;
const {
  ComposedChart, Area, Line,
  XAxis, YAxis, CartesianGrid, Tooltip, Legend,
  ResponsiveContainer,
} = Recharts;

// ─── helpers (preserved from original) ──────────────────────────────────────

function deduplicatePoints(pts) {
  const seen = new Set();
  return pts.filter(p => {
    const key = `${p.point_num}|${p.set_num}|${p.game_num}|${p.home_point}|${p.away_point}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

const SIDE      = { home: 'A', away: 'B' };
const pct       = v => (typeof v === 'number' && isFinite(v)) ? (v*100).toFixed(1)+'%' : '—';
const sign      = v => (typeof v === 'number' && isFinite(v)) ? (v>0?'+':'')+v.toFixed(3) : '—';
const edgeColor = v => {
  if (typeof v !== 'number' || !isFinite(v)) return 'var(--ink-3)';
  return v > 0.02 ? 'var(--edge)' : v < -0.02 ? 'var(--edge-neg)' : 'var(--edge-neu)';
};

function enrichForPlayer(pts, player) {
  return pts.map(p => {
    const flip = player === 'B';
    const m = p.model_prob_a     != null ? (flip ? 1-p.model_prob_a     : p.model_prob_a)     : null;
    const b = p.bookmaker_prob_a != null ? (flip ? 1-p.bookmaker_prob_a : p.bookmaker_prob_a) : null;
    const e = p.edge             != null ? (flip ? -p.edge              : p.edge)             : null;
    const hasBoth = m != null && b != null;
    return { ...p, _model:m, _bookie:b, _edge:e,
             lower: hasBoth ? Math.min(m,b) : null,
             gap:   hasBoth ? Math.abs(m-b) : null };
  });
}

function groupByGame(points) {
  const map = new Map();
  for (const pt of points) {
    if (pt.is_complete_marker) continue;
    const key = `${pt.set_num}-${pt.game_num}`;
    if (!map.has(key)) map.set(key, { set: pt.set_num, game: pt.game_num, points: [] });
    map.get(key).points.push(pt);
  }
  return [...map.values()].sort((a,b) => a.set !== b.set ? a.set-b.set : a.game-b.game);
}

// Build the cumulative scoreboard from the latest row's per-set game columns.
// The latest row carries the full state at the time of the last poll: how
// many sets each side has won, the per-set game totals (set1/set2/set3),
// the current set's running games, and the live point score. Reading the
// per-set columns directly means we still reconstruct the score correctly
// when polling started mid-match (so set 1 has no captured points) or when
// the match has ended (the is_complete_marker row carries the final tally).
function deriveScoreFromColumns(pts) {
  if (!pts.length) return null;
  const latest = pts[pts.length - 1];
  const setsA  = latest.home_sets_won ?? 0;
  const setsB  = latest.away_sets_won ?? 0;
  const isFinal = !!latest.is_complete_marker
    || (latest.status && String(latest.status).toLowerCase() === 'finished');

  const completedSets = [];
  for (let s = 1; s <= 5; s++) {
    const h = latest[`home_set${s}_games`];
    const a = latest[`away_set${s}_games`];
    if (h == null && a == null) break;
    const isCompleted = s <= (setsA + setsB);
    if (isCompleted) {
      completedSets.push({ h: h ?? 0, a: a ?? 0 });
    } else {
      break;
    }
  }

  return {
    setsA,
    setsB,
    gamesA: latest.home_games_won ?? 0,
    gamesB: latest.away_games_won ?? 0,
    completedSets,
    isFinal,
  };
}

const STD      = new Set(['0','15','30','40','A','AD']);
const fmtSc    = v => v == null ? '?' : v === 'A' ? 'AD' : String(v);
const fmtPbpSc = v => v == null ? '?' : (v === 'A' || v === 'AD') ? 'Ad' : String(v);

function isBP(pt) {
  if (!STD.has(pt.home_point) || !STD.has(pt.away_point)) return false;
  if (pt.server !== 'home' && pt.server !== 'away') return false;
  const ret = pt.server==='home' ? pt.away_point : pt.home_point;
  const srv = pt.server==='home' ? pt.home_point : pt.away_point;
  return ret==='A' || ret==='AD' || (ret==='40' && (srv==='0'||srv==='15'||srv==='30'));
}

function abbrev(name) {
  if (!name) return '???';
  return name.trim().split(/\s+/).pop().slice(0,4).toUpperCase();
}

function lastName(name) {
  if (!name) return '';
  return name.trim().split(/\s+/).pop();
}

const countryFlag = (alpha2) => {
  if (!alpha2) return '';
  return alpha2.toUpperCase().split('').map(c =>
    String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65)
  ).join('');
};

function inferGameWinner(hp, ap, pw, hasNext) {
  const isTB = !STD.has(hp) || !STD.has(ap);
  if (isTB) {
    if (!hasNext) return null;
    const h = parseInt(hp), a = parseInt(ap);
    if (!isNaN(h) && !isNaN(a)) return h > a ? 'home' : h < a ? 'away' : pw;
    return pw;
  }
  const NON40 = new Set(['0','15','30']);
  if (hp === '40' && NON40.has(ap) && pw === 'home') return 'home';
  if (ap === '40' && NON40.has(hp) && pw === 'away') return 'away';
  if ((hp === 'A' || hp === 'AD') && pw === 'home')  return 'home';
  if ((ap === 'A' || ap === 'AD') && pw === 'away')  return 'away';
  if (!hasNext) return null;
  const AHEAD = new Set(['40','A','AD']);
  if (AHEAD.has(hp) && !AHEAD.has(ap)) return 'home';
  if (AHEAD.has(ap) && !AHEAD.has(hp)) return 'away';
  return pw;
}

function computeMatchStats(points) {
  if (!points.length) return null;
  // Exclude the post-match summary row from per-point counts.
  points = points.filter(p => !p.is_complete_marker);
  if (!points.length) return null;
  const allGames = groupByGame(points);
  const result = {};
  for (const side of ['home', 'away']) {
    const opp = side === 'home' ? 'away' : 'home';
    const ptsWon       = points.filter(p => p.point_winner === side).length;
    const servePts     = points.filter(p => p.server === side);
    const serveWon     = servePts.filter(p => p.point_winner === side).length;
    const returnPts    = points.filter(p => p.server === opp);
    const returnWon    = returnPts.filter(p => p.point_winner === side).length;
    let svcHolds = 0, svcTotal = 0;
    for (let gi = 0; gi < allGames.length; gi++) {
      const g = allGames[gi];
      if (g.points[0]?.server !== side) continue;
      svcTotal++;
      const last = g.points[g.points.length - 1];
      if (!last) continue;
      const w = inferGameWinner(last.home_point, last.away_point, last.point_winner, gi < allGames.length - 1);
      if (w === side) svcHolds++;
    }
    const bpRecvFaced = points.filter(p => p.server === opp  && isBP(p)).length;
    const bpRecvWon   = points.filter(p => p.server === opp  && isBP(p) && p.point_winner === side).length;
    const bpSrvFaced  = points.filter(p => p.server === side && isBP(p)).length;
    const bpSrvSaved  = points.filter(p => p.server === side && isBP(p) && p.point_winner === side).length;
    let serveStreak = 0;
    for (let i = points.length - 1; i >= 0; i--) {
      const p = points[i];
      if (p.server === side) {
        if (p.point_winner === side) serveStreak++;
        else break;
      }
    }
    result[side] = { ptsWon, serveWon, servePtsTotal: servePts.length, returnWon, returnPtsTotal: returnPts.length, svcHolds, svcTotal, bpRecvWon, bpRecvFaced, bpSrvSaved, bpSrvFaced, serveStreak };
  }
  return result;
}

function fmtKickoffTime(unix) {
  return new Date(unix * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function fmtKickoffDay(unix) {
  const d = new Date(unix * 1000), now = new Date();
  const tom = new Date(now); tom.setDate(now.getDate() + 1);
  if (d.toDateString() === now.toDateString()) return 'Today';
  if (d.toDateString() === tom.toDateString()) return 'Tomorrow';
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function tournamentOf(m) {
  return m.tournament_name || m.tournament || 'Other';
}
function categoryOf(m) {
  if (m.tour) return m.tour.toUpperCase();
  if (m.category) return String(m.category).toUpperCase();
  return 'ATP';
}

// ─── Date helpers (matches landing page) ─────────────────────────────────────

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAY_NAMES   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function todayLocal() {
  const n = new Date();
  return new Date(n.getFullYear(), n.getMonth(), n.getDate());
}
function fmtLocalISO(d) {
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${d.getFullYear()}-${m}-${day}`;
}
function unixToLocalISO(unix) {
  const d = new Date(unix * 1000);
  return fmtLocalISO(d);
}
function fmtDateDisplay(d) {
  return `${DAY_NAMES[d.getDay()]}, ${MONTH_NAMES[d.getMonth()]} ${d.getDate()}`;
}
function dayDiff(a, b) {
  const a0 = new Date(a.getFullYear(), a.getMonth(), a.getDate());
  const b0 = new Date(b.getFullYear(), b.getMonth(), b.getDate());
  return Math.round((a0 - b0) / 86400000);
}
function eyebrowFor(diff) {
  if (diff === 0) return { text: 'Today',     other: false };
  if (diff === -1) return { text: 'Yesterday', other: true  };
  if (diff === 1) return { text: 'Tomorrow',  other: true  };
  if (diff < 0)   return { text: `${Math.abs(diff)} days ago`, other: true };
  return { text: `In ${diff} days`, other: true };
}

// Side-of-tiebreak superscript (e.g. 7⁵ means 7-5 in TB) — split tiebreak
// from the main set score when the data carries it as `7^5` or `7-5`.
function splitSetScore(v) {
  if (v == null) return { main: null, tb: null };
  const s = String(v);
  let m = s.match(/^(\d+)\s*[\^\-:]\s*(\d+)$/);
  if (m) return { main: m[1], tb: m[2] };
  return { main: s, tb: null };
}

// ─── Match Card (live / upcoming / final) ───────────────────────────────────

function deriveWinnerSide(match) {
  if (match.winner === 'home' || match.winner === 'away') return match.winner;
  if (match.winner_side) return match.winner_side;
  if (typeof match.sets_a === 'number' && typeof match.sets_b === 'number') {
    if (match.sets_a > match.sets_b) return 'home';
    if (match.sets_b > match.sets_a) return 'away';
  }
  if (typeof match.home_sets_won === 'number' && typeof match.away_sets_won === 'number') {
    if (match.home_sets_won > match.away_sets_won) return 'home';
    if (match.away_sets_won > match.home_sets_won) return 'away';
  }
  return null;
}

function MatchCard({ match, kind, onClick }) {
  // kind: 'live' | 'upcoming' | 'final'
  const servingA = match.server === 'home';
  const servingB = match.server === 'away';
  const round = match.round || '';
  const isWalkover = !!match.is_walkover || /walk[- ]?over/i.test(String(match.status || ''));

  let header;
  if (kind === 'live') {
    const setLabel = match.current_set ? `${ordinal(match.current_set)} Set` : 'Live';
    header = (
      <div className="card-status-live"><div className="live-dot"/>{setLabel}</div>
    );
  } else if (kind === 'upcoming') {
    const day  = match.scheduled_start_unix != null ? fmtKickoffDay(match.scheduled_start_unix)  : null;
    const time = match.scheduled_start_unix != null ? fmtKickoffTime(match.scheduled_start_unix) : null;
    const text = day && time ? (day === 'Today' ? time : `${day} · ${time}`) : (time || 'Scheduled');
    header = <div className="card-status-time">{text}</div>;
  } else {
    if (isWalkover) {
      header = <div className="card-status-wo">Walkover</div>;
    } else {
      header = <div className="card-status-final">Final</div>;
    }
  }

  const winnerSide = kind === 'final' ? deriveWinnerSide(match) : null;
  const nameClassA = kind === 'final' ? (winnerSide === 'home' ? ' winner' : winnerSide === 'away' ? ' loser' : '') : '';
  const nameClassB = kind === 'final' ? (winnerSide === 'away' ? ' winner' : winnerSide === 'home' ? ' loser' : '') : '';

  const completedA = Array.isArray(match.set_scores_a) ? match.set_scores_a : null;
  const completedB = Array.isArray(match.set_scores_b) ? match.set_scores_b : null;
  const completedTbA = Array.isArray(match.set_tiebreaks_a) ? match.set_tiebreaks_a : null;
  const completedTbB = Array.isArray(match.set_tiebreaks_b) ? match.set_tiebreaks_b : null;

  const renderSetsRow = (side) => {
    if (kind === 'upcoming') {
      const t = match.scheduled_start_unix != null ? fmtKickoffTime(match.scheduled_start_unix) : '';
      return side === 'a' ? <div className="upcoming-time-area"><div className="upcoming-time">{t}</div></div> : null;
    }
    if (kind === 'final' && isWalkover) {
      return side === 'a'
        ? <div className="sets-area"><span className="wo-mark">w/o</span></div>
        : null;
    }
    const completed = side === 'a' ? completedA : completedB;
    const opp       = side === 'a' ? completedB : completedA;
    const tbList    = side === 'a' ? completedTbA : completedTbB;
    const cells = [];
    if (completed && completed.length) {
      for (let i = 0; i < completed.length; i++) {
        const v   = completed[i];
        const ov  = opp ? opp[i] : null;
        const won = ov != null && v > ov;
        const tb  = tbList && tbList[i] != null ? tbList[i] : null;
        const split = splitSetScore(v);
        const main = split.main ?? v;
        const tbVal = tb != null ? tb : split.tb;
        cells.push(
          <div key={'c'+i} className={`set-score${won?' won':''}`}>
            {main}
            {tbVal != null && <sup>{tbVal}</sup>}
          </div>
        );
      }
    } else {
      const sets = side === 'a'
        ? (match.home_sets_won ?? match.sets_a)
        : (match.away_sets_won ?? match.sets_b);
      if (sets != null) cells.push(<div key="s" className="set-score">{sets}</div>);
    }
    if (kind === 'live') {
      const games = side === 'a'
        ? (match.home_games_won ?? match.games_a)
        : (match.away_games_won ?? match.games_b);
      if (games != null) cells.push(<div key="live" className="set-score live">{games}</div>);
      const pts = side === 'a' ? match.home_point : match.away_point;
      if (pts != null) cells.push(<div key="pts" className="pts-score">{fmtSc(pts)}</div>);
    }
    return <div className="sets-area">{cells}</div>;
  };

  const cardClass = `match-card${kind === 'live' ? ' live' : ''}`;
  return (
    <div className={cardClass} onClick={() => onClick && onClick(match)}>
      <div className="card-header-row">
        <div className="card-round">{round || tournamentOf(match)}</div>
        {header}
      </div>
      <div className="card-players">
        <div className={`player-row${kind === 'live' && servingA ? ' serving' : ''}`}>
          <div className="player-flag">{countryFlag(match.country_a)}</div>
          {match.seed_a != null && <div className="player-seed">{match.seed_a}</div>}
          <div className={`player-name${nameClassA}`}>{match.player_a}</div>
          {renderSetsRow('a')}
        </div>
        <div className={`player-row${kind === 'live' && servingB ? ' serving' : ''}`}>
          <div className="player-flag">{countryFlag(match.country_b)}</div>
          {match.seed_b != null && <div className="player-seed">{match.seed_b}</div>}
          <div className={`player-name${nameClassB}`}>{match.player_b}</div>
          {renderSetsRow('b')}
        </div>
      </div>
    </div>
  );
}

function ordinal(n) {
  const k = Number(n);
  if (!isFinite(k)) return String(n);
  const s = ['th','st','nd','rd'], v = k % 100;
  return k + (s[(v - 20) % 10] || s[v] || s[0]);
}

// ─── Tour subsection (ATP or WTA column inside a section) ───────────────────

function TourSubsection({ tour, items, kindOf, onSelect, emptyLabel }) {
  // Group by tournament_name, preserving incoming order within a tournament.
  const groups = [];
  const idx = new Map();
  for (const m of items) {
    const t = tournamentOf(m);
    if (!idx.has(t)) {
      idx.set(t, groups.length);
      groups.push({ tournament: t, surface: m.surface, matches: [] });
    }
    groups[idx.get(t)].matches.push(m);
  }
  const tourLabel = tour === 'ATP' ? "Men's Tour" : "Women's Tour";
  return (
    <div className="tour-subsection">
      <div className="tour-subhead">
        <span className="tour-tag">{tour}</span>
        <span className="tour-name">{tourLabel}</span>
        <span className="rule"/>
      </div>
      {groups.length === 0 ? (
        <div className="tour-empty">{emptyLabel}</div>
      ) : groups.map(g => (
        <div className="tournament-group" key={g.tournament}>
          <div className="tournament-label">
            {g.tournament}
            {g.surface && <span className="surface-pill">{g.surface}</span>}
          </div>
          <div className="match-grid">
            {g.matches.map(m => (
              <MatchCard key={m.match_id} match={m} kind={kindOf(m)} onClick={onSelect}/>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── Section block (In Progress / Upcoming / Completed) ─────────────────────

function MatchSection({ id, title, blurb, count, hidden, isLive, items, kindOf, onSelect, emptyMessage }) {
  if (hidden) return null;
  const atp = items.filter(m => categoryOf(m) === 'ATP');
  const wta = items.filter(m => categoryOf(m) === 'WTA');
  const isEmpty = items.length === 0;
  return (
    <section className="match-section" id={id}>
      <div className="section-head">
        <div className="section-title">
          {isLive && <span className="live-dot"/>}
          {title}
        </div>
        <div className="section-count">{count} match{count === 1 ? '' : 'es'}</div>
        {blurb && <div className="section-blurb">{blurb}</div>}
      </div>
      {isEmpty ? (
        <div className="section-empty">{emptyMessage}</div>
      ) : (
        <div className="tour-cols">

          <TourSubsection tour="WTA" items={wta} kindOf={kindOf} onSelect={onSelect}

// ─── Matches Tab (unified landing page) ─────────────────────────────────────

function MatchesTab({ active, onSelect }) {
  const [liveMatches,     setLiveMatches]     = useState([]);
  const [upcomingMatches, setUpcomingMatches] = useState([]);
  const [allMatches,      setAllMatches]      = useState([]);
  const [error,           setError]           = useState(null);
  const [filter,          setFilter]          = useState('all');
  const [selectedDate,    setSelectedDate]    = useState(() => todayLocal());
  const [datePickerOpen,  setDatePickerOpen]  = useState(false);
  const datePickerRef = useRef(null);
  const dateJumpRef   = useRef(null);

  // ── Polling: live (15s), upcoming (5min), matches (once) ─────────────────
  const fetchLive = useCallback(async () => {
    try {
      const data = await fetch('/live_matches').then(r => r.json());
      setLiveMatches(Array.isArray(data) ? data : []);
      setError(null);
    } catch(e) { setError(e.message); }
  }, []);

  const fetchUpcoming = useCallback(async () => {
    try {
      const data = await fetch('/upcoming_matches').then(r => r.json());
      setUpcomingMatches(Array.isArray(data) ? data : []);
      setError(null);
    } catch(e) { setError(e.message); }
  }, []);

  const fetchAll = useCallback(async () => {
    try {
      const data = await fetch('/matches').then(r => r.json());
      setAllMatches(Array.isArray(data) ? data : []);
      setError(null);
    } catch(e) { setError(e.message); }
  }, []);

  useEffect(() => {
    fetchLive();
    const id = setInterval(fetchLive, 15_000);
    return () => clearInterval(id);
  }, [fetchLive]);

  useEffect(() => {
    fetchUpcoming();
    const id = setInterval(fetchUpcoming, 5 * 60 * 1000);
    return () => clearInterval(id);
  }, [fetchUpcoming]);

  useEffect(() => { fetchAll(); }, [fetchAll]);

  // ── Date navigation (arrow keys) ─────────────────────────────────────────
  useEffect(() => {
    const onKey = (e) => {
      if (!active) return;
      const ae = document.activeElement;
      if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.isContentEditable)) return;
      if (e.key === 'ArrowLeft') {
        setSelectedDate(d => {
          const n = new Date(d); n.setDate(n.getDate() - 1); return n;
        });
      } else if (e.key === 'ArrowRight') {
        setSelectedDate(d => {
          const n = new Date(d); n.setDate(n.getDate() + 1); return n;
        });
      }
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [active]);

  // ── Date picker open/close ───────────────────────────────────────────────
  useEffect(() => {
    const onClick = (e) => {
      if (dateJumpRef.current && !dateJumpRef.current.contains(e.target)) {
        setDatePickerOpen(false);
      }
    };
    document.addEventListener('click', onClick);
    return () => document.removeEventListener('click', onClick);
  }, []);

  // ── Derive section lists from cached data + selectedDate ─────────────────
  const today = todayLocal();
  const selectedISO = fmtLocalISO(selectedDate);
  const todayISO    = fmtLocalISO(today);
  const diff        = dayDiff(selectedDate, today);
  const isPast      = diff < 0;
  const isToday     = diff === 0;
  const isFuture    = diff > 0;

  const liveById = useMemo(() => {
    const s = new Set();
    for (const m of liveMatches) s.add(m.match_id);
    return s;
  }, [liveMatches]);

  // LIVE — only relevant on today
  const liveItems = useMemo(() => {
    if (!isToday) return [];
    return [...liveMatches];
  }, [liveMatches, isToday]);

  // UPCOMING — today: from /upcoming_matches scheduled today, not in /live_matches,
  // not past-scheduled. future: from /upcoming_matches scheduled on selectedDate.
  // past: empty.
  const upcomingItems = useMemo(() => {
    if (isPast) return [];
    const nowSec = Date.now() / 1000;
    const seen = new Set();
    const out = [];
    for (const m of upcomingMatches) {
      if (m.match_id == null) continue;
      if (seen.has(m.match_id)) continue;
      if (m.scheduled_start_unix == null) continue;
      const iso = unixToLocalISO(m.scheduled_start_unix);
      if (iso !== selectedISO) continue;
      if (isToday) {
        if (liveById.has(m.match_id)) continue;
        if (m.scheduled_start_unix < nowSec) continue;
      }
      seen.add(m.match_id);
      out.push(m);
    }
    return out.sort((a, b) => (a.scheduled_start_unix ?? 0) - (b.scheduled_start_unix ?? 0));
  }, [upcomingMatches, liveById, isPast, isToday, selectedISO]);

  // COMPLETED — past or today: from /matches with match_date===selectedDate,
  // excluding live ids. future: empty.
  const completedItems = useMemo(() => {
    if (isFuture) return [];
    const out = [];
    const seen = new Set();
    for (const m of allMatches) {
      if (!m.match_date) continue;
      if (m.match_date !== selectedISO) continue;
      if (m.match_id != null && liveById.has(m.match_id)) continue;
      if (m.match_id != null) {
        if (seen.has(m.match_id)) continue;
        seen.add(m.match_id);
      }
      out.push(m);
    }
    return out;
  }, [allMatches, liveById, isFuture, selectedISO]);

  const liveCount      = liveItems.length;
  const upcomingCount  = upcomingItems.length;
  const completedCount = completedItems.length;
  const allCount       = liveCount + upcomingCount + completedCount;

  const eyebrow = eyebrowFor(diff);

  // ── Date controls ────────────────────────────────────────────────────────
  const goPrevDay = () => setSelectedDate(d => { const n = new Date(d); n.setDate(n.getDate() - 1); return n; });
  const goNextDay = () => setSelectedDate(d => { const n = new Date(d); n.setDate(n.getDate() + 1); return n; });

  const onPickerChange = (e) => {
    const v = e.target.value;
    if (!v) return;
    const [y, m, d] = v.split('-').map(Number);
    setSelectedDate(new Date(y, m - 1, d));
    setDatePickerOpen(false);
  };

  const openPicker = (e) => {
    e.stopPropagation();
    setDatePickerOpen(o => !o);
    setTimeout(() => {
      const inp = datePickerRef.current;
      if (inp) {
        inp.focus();
        if (inp.showPicker) { try { inp.showPicker(); } catch(_) {} }
      }
    }, 50);
  };

  const filterShow = (sec) => filter === 'all' || filter === sec;

  const liveKind = () => 'live';
  const upKind   = () => 'upcoming';
  const finalKind = () => 'final';

  // Empty messages per date / section
  const liveEmpty = isToday ? 'No live matches at the moment.' :
                    isPast  ? 'Past dates have no live data.'  :
                              'Future dates have no live data.';
  const upcomingEmpty = isPast    ? 'Past dates have no upcoming matches.' :
                       isToday   ? 'No upcoming matches scheduled for the rest of today.' :
                                   `No matches scheduled for ${MONTH_NAMES[selectedDate.getMonth()]} ${selectedDate.getDate()}.`;
  const completedEmpty = isFuture ? 'Future dates have no completed matches.' :
                                    `No completed matches on ${MONTH_NAMES[selectedDate.getMonth()]} ${selectedDate.getDate()}.`;

  return (
    <div className="matches-page">
      {error && <div className="error-banner">⚠ {error}</div>}

      {/* Date hero */}
      <div className="date-hero">
        <div className="date-row">
          <button className="date-arrow" onClick={goPrevDay} aria-label="Previous day">‹</button>
          <div className="date-display">
            <div className={`date-eyebrow${eyebrow.other ? ' other' : ''}`}>{eyebrow.text}</div>
            <div className="date-main">{fmtDateDisplay(selectedDate)}</div>
          </div>
          <button className="date-arrow" onClick={goNextDay} aria-label="Next day">›</button>
        </div>
        <div className={`date-jump${datePickerOpen ? ' open' : ''}`} ref={dateJumpRef}>
          <button className="date-jump-trigger" onClick={openPicker} aria-label="Jump to date">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5">
              <rect x="2" y="3" width="12" height="11" rx="1.5"/>
              <line x1="2" y1="6.5" x2="14" y2="6.5"/>
              <line x1="6" y1="1.5" x2="6" y2="4"/>
              <line x1="10" y1="1.5" x2="10" y2="4"/>
            </svg>
            jump to date
          </button>
          <input type="date" ref={datePickerRef} value={selectedISO} onChange={onPickerChange}/>
        </div>
      </div>

      {/* Filter toggle */}
      <div className="filter-toggle-wrap">
        <div className="filter-toggle">
          <button className={filter==='all' ? 'active' : ''} onClick={() => setFilter('all')}>
            All <span className="count">{allCount}</span>
          </button>
          <button className={filter==='live' ? 'active' : ''} onClick={() => setFilter('live')}>
            <span className="dot-live"/>Live <span className="count">{liveCount}</span>
          </button>
          <button className={filter==='upcoming' ? 'active' : ''} onClick={() => setFilter('upcoming')}>
            Upcoming <span className="count">{upcomingCount}</span>
          </button>
          <button className={filter==='completed' ? 'active' : ''} onClick={() => setFilter('completed')}>
            Completed <span className="count">{completedCount}</span>
          </button>
        </div>
      </div>

      {/* Sections */}
      <MatchSection
        id="sec-live"
        title="In Progress"
        blurb="Updated every 15s"
        count={liveCount}
        hidden={!filterShow('live')}
        isLive={true}
        items={liveItems}
        kindOf={liveKind}
        onSelect={onSelect}
        emptyMessage={liveEmpty}
      />

      <MatchSection
        id="sec-upcoming"
        title="Upcoming"
        blurb={isToday ? 'Scheduled later today' : (isFuture ? `Scheduled for ${MONTH_NAMES[selectedDate.getMonth()]} ${selectedDate.getDate()}` : null)}
        count={upcomingCount}
        hidden={!filterShow('upcoming')}
        isLive={false}
        items={upcomingItems}
        kindOf={upKind}
        onSelect={onSelect}
        emptyMessage={upcomingEmpty}
      />

      <MatchSection
        id="sec-completed"
        title="Completed"
        blurb={isToday ? 'Final results today' : (isPast ? `Final results for ${MONTH_NAMES[selectedDate.getMonth()]} ${selectedDate.getDate()}` : null)}
        count={completedCount}
        hidden={!filterShow('completed')}
        isLive={false}
        items={completedItems}
        kindOf={finalKind}
        onSelect={onSelect}
        emptyMessage={completedEmpty}
      />
    </div>
  );
}

// ─── Match Detail tab (UNCHANGED — preserved exactly as before) ─────────────

function HeroCard({ match, latest, sc, viewPlayer, setViewPlayer, isScrubbing, isFinal: isFinalProp }) {
  const isFinal = sc?.isFinal ?? isFinalProp;
  const flip    = viewPlayer==='B';
  const modelP  = !latest ? null : (flip ? (latest.model_prob_a     !=null ? 1-latest.model_prob_a     : null) : latest.model_prob_a);
  const bookieP = !latest ? null : (flip ? (latest.bookmaker_prob_a !=null ? 1-latest.bookmaker_prob_a : null) : latest.bookmaker_prob_a);
  const edge    = !latest ? null : (flip ? (latest.edge             !=null ? -latest.edge              : null) : latest.edge);
  const alert   = edge!=null && Math.abs(edge)>0.15;

  const playerA = match.player_a ?? 'Home (A)';
  const playerB = match.player_b ?? 'Away (B)';
  const completedSets = sc?.completedSets ?? [];
  const gamesA = sc?.gamesA ?? latest?.home_games_won ?? 0;
  const gamesB = sc?.gamesB ?? latest?.away_games_won ?? 0;
  const numSets = completedSets.length + (isFinal ? 0 : 1);
  const setHeaders = Array.from({length: numSets}, (_, i) =>
    i < completedSets.length ? `S${i+1}` : `S${i+1}*`
  );
  const homeSetVals = isFinal
    ? completedSets.map(s => s.h)
    : [...completedSets.map(s => s.h), gamesA];
  const awaySetVals = isFinal
    ? completedSets.map(s => s.a)
    : [...completedSets.map(s => s.a), gamesB];

  const cellClass = (val, opp, isCompleted) => {
    let c = 'h-set';
    if (isCompleted) {
      if (val > opp) c += ' won';
    } else {
      c += ' live';
    }
    return c;
  };

  const srvA = latest?.server === 'home';
  const srvB = latest?.server === 'away';

  const tournament = match.tournament_name || match.tournament;
  const round      = match.round;
  const court      = match.court;
  const surface    = match.surface;
  const startTxt   = match.scheduled_start_unix != null
    ? `${fmtKickoffDay(match.scheduled_start_unix)} · ${fmtKickoffTime(match.scheduled_start_unix)}`
    : null;

  return (
    <div className="dash-hero">
      <div className="hero-meta-bar">
        {tournament && <span className="tourn-tag">{tournament}{round ? ` · ${round}` : ''}</span>}
        {court && <><span className="hero-meta-dot">●</span><span>{court}</span></>}
        {surface && <><span className="hero-meta-dot">●</span><span>{surface}</span></>}
        {startTxt && <><span className="hero-meta-dot">●</span><span>{startTxt}</span></>}
        {!isFinal && <div className="hero-live-badge"><div className="live-dot"/>Live</div>}
        {isScrubbing && <div className="hero-frozen-badge">⏸ Scrubbing</div>}
      </div>
      <div className="hero-score-row">
        <table className="hero-score-tbl">
          <thead>
            <tr>
              <th className="th-name"></th>
              {setHeaders.map(h => <th key={h}>{h}</th>)}
              {!isFinal && <th>PTS</th>}
            </tr>
          </thead>
          <tbody>
            <tr>
              <td className="h-name">
                <span className={srvA ? 'h-serve' : 'h-serve-sp'}/>
                {playerA}
              </td>
              {homeSetVals.map((v, i) => {
                const isCompleted = i < completedSets.length;
                const opp = awaySetVals[i] ?? 0;
                return <td key={i} className={cellClass(v, opp, isCompleted)}>{v ?? '—'}</td>;
              })}
              {!isFinal && <td className="h-pts">{latest ? fmtSc(latest.home_point) : '—'}</td>}
            </tr>
            <tr>
              <td className="h-name">
                <span className={srvB ? 'h-serve' : 'h-serve-sp'}/>
                {playerB}
              </td>
              {awaySetVals.map((v, i) => {
                const isCompleted = i < completedSets.length;
                const opp = homeSetVals[i] ?? 0;
                return <td key={i} className={cellClass(v, opp, isCompleted)}>{v ?? '—'}</td>;
              })}
              {!isFinal && <td className="h-pts">{latest ? fmtSc(latest.away_point) : '—'}</td>}
            </tr>
          </tbody>
        </table>
        <div className="hero-divider"/>
        <div className="hero-probs">
          <div className="hero-prob-item">
            <div className="hp-label">Model</div>
            <div className="hp-val a">{pct(modelP)}</div>
            <div className="hp-sub">{modelP == null ? 'Model coming soon' : `P(${viewPlayer === 'A' ? lastName(playerA) : lastName(playerB)})`}</div>
          </div>
          <div className="hero-prob-item">
            <div className="hp-label">Book</div>
            <div className="hp-val b">{pct(bookieP)}</div>
            <div className="hp-sub">{bookieP == null ? 'Bookmaker n/a' : 'Bookmaker'}</div>
          </div>
          <div className="hero-prob-item">
            <div className="hp-label">Edge ⚡</div>
            <div className={`hp-val edge${edge != null && edge < 0 ? ' neg' : ''}${alert ? ' alerting' : ''}`}>
              {sign(edge)}
            </div>
            <div className="hp-sub">{edge == null ? '—' : (alert ? 'Alert' : 'vs Book')}</div>
          </div>
        </div>
        <div className="hero-toggle">
          <button className={viewPlayer==='A' ? 'active' : ''} onClick={()=>setViewPlayer('A')}>{lastName(playerA)}</button>
          <button className={viewPlayer==='B' ? 'active' : ''} onClick={()=>setViewPlayer('B')}>{lastName(playerB)}</button>
        </div>
      </div>
    </div>
  );
}

function MomentumBar({ latest, playerA, playerB }) {
  const da = latest?.d_a, db = latest?.d_b;
  const valid = typeof da==='number' && typeof db==='number' && isFinite(da) && isFinite(db) && (da+db)>0;
  const pos = valid ? Math.max(0.05, Math.min(0.95, da/(da+db))) : 0.5;
  const lead = pos - 0.5;
  const aWidth = Math.max(0, lead) * 100;
  const bWidth = Math.max(0, -lead) * 100;
  const aPct = valid ? (pos * 100).toFixed(1) : '—';
  const bPct = valid ? ((1 - pos) * 100).toFixed(1) : '—';
  return (
    <div className="dash-mom">
      <div className="mom-row-top">
        <span className="mom-player-a">{lastName(playerA)} <span style={{fontVariantNumeric:'tabular-nums'}}>{valid ? aPct + '%' : '—'}</span></span>
        <span className="mom-center-lbl">{valid ? 'Momentum' : 'Momentum · Model coming soon'}</span>
        <span className="mom-player-b"><span style={{fontVariantNumeric:'tabular-nums'}}>{valid ? bPct + '%' : '—'}</span> {lastName(playerB)}</span>
      </div>
      <div className="mom-bar">
        <div className="mom-fill-a" style={{width: aWidth + '%'}}/>
        <div className="mom-fill-b" style={{width: bWidth + '%'}}/>
        <div className="mom-tick"/>
      </div>
    </div>
  );
}

                 tick={{fontSize:10, fill:'#8a6e5a'}} stroke="#d9c6a8"/>
          <Tooltip content={<TT/>}/>
          <Legend wrapperStyle={{fontSize:'0.72rem', paddingTop:8, color:'#5a4234'}}/>
          <Area dataKey="lower" stackId="band" stroke="none" fill="transparent" fillOpacity={0} legendType="none" dot={false}/>
          <Area dataKey="gap"   stackId="band" stroke="none" fill="#c85a33" fillOpacity={0.18} name="Edge band" dot={false}/>
          <Line type="monotone" dataKey="_model"  stroke="#2b1d15" strokeWidth={2.5} dot={false}
                name={`Model P(${viewPlayer === 'A' ? lastName(playerA) : lastName(playerB)})`}/>
          <Line type="monotone" dataKey="_bookie" stroke="#c85a33" strokeWidth={2} strokeDasharray="5 4" dot={false}
                name={`Book P(${viewPlayer === 'A' ? lastName(playerA) : lastName(playerB)})`} connectNulls/>
        </ComposedChart>
      </ResponsiveContainer>
      {!hasModelData && (
        <div className="coming-soon-overlay">
          <div className="coming-soon-msg">Model coming soon · — — —</div>
        </div>
      )}
    </div>
  );
}

function LiveScrubber({ total, scrubIdx, onScrub, onLive }) {
  if (total < 2) return null;
  const frozen = scrubIdx !== null;
  const val = scrubIdx ?? total - 1;
  return (
    <div className="scrubber">
      <span className="scrub-lbl">Point {val+1} / {total}</span>
      <input type="range" min={0} max={total-1} value={val}
             onChange={e => onScrub(Number(e.target.value))} className="scrub-input"/>
      <button className={`scrub-btn${frozen ? ' frozen' : ''}`} onClick={onLive}>
        {frozen ? '⏩ JUMP LIVE' : '● LIVE'}
      </button>
    </div>
  );
}

function SignalsCard({ latest, playerA, playerB }) {
  const SIG_KEYS = [['NMI','nmi'],['SMS','sms'],['RMS','rms'],['PMS','pms'],['GPS','gps']];
  const fmtVal = v => (typeof v === 'number' && isFinite(v)) ? Math.round(v) : '—';
  const fillPct = v => (typeof v === 'number' && isFinite(v)) ? Math.max(0, Math.min(100, v)) : 0;
  const hasAnySignal = latest && SIG_KEYS.some(([, k]) =>
    typeof latest[k+'_a'] === 'number' && isFinite(latest[k+'_a'])
  );
  return (
    <div className="dash-card" style={{display:'flex',flexDirection:'column',justifyContent:'center'}}>
      <div className="dash-card-hdr">
        <div className="dash-sec-lbl">Signals</div>
        {!hasAnySignal && (
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',
                       fontSize:'0.82rem',color:'var(--ink-3)'}}>
            Model coming soon
          </div>
        )}
      </div>
      <div className="sig-names">
        <span/>
        <span className="sig-na" style={{gridColumn:2}}>{lastName(playerA)}</span>
        <span/>
        <span className="sig-nb" style={{gridColumn:4}}>{lastName(playerB)}</span>
        <span/>
      </div>
      {SIG_KEYS.map(([lbl, k]) => {
        const va = latest ? latest[k+'_a'] : null;
        const vb = latest ? latest[k+'_b'] : null;
        return (
          <div className="sig-row-d" key={k}>
            <div className="sig-v l">{fmtVal(va)}</div>
            <div className="sig-bar-track"><div className="sig-fill-a" style={{width: fillPct(va) + '%'}}/></div>
            <div className="sig-lbl-d">{lbl}</div>
            <div className="sig-bar-track"><div className="sig-fill-b" style={{width: fillPct(vb) + '%'}}/></div>
            <div className="sig-v">{fmtVal(vb)}</div>
          </div>
        );
      })}
    </div>
  );
}

function PointByPoint({ allPoints, playerA, playerB }) {
  const games = useMemo(() => groupByGame(allPoints), [allPoints]);
  const setNums = useMemo(
    () => [...new Set(games.map(g => g.set))].sort((a,b) => a-b),
    [games]
  );
  const [activeSet, setActiveSet] = useState(null);

  useEffect(() => {
    if (!setNums.length) return;
    if (activeSet == null || !setNums.includes(activeSet)) {
      setActiveSet(setNums[setNums.length - 1]);
    }
  }, [setNums, activeSet]);

  if (!games.length) return (
    <div className="dash-card">
      <div className="dash-card-hdr"><div className="dash-sec-lbl">Point by Point</div></div>
      <div className="empty-state" style={{padding:'24px 0',fontSize:'0.95rem'}}>No points yet.</div>
    </div>
  );

  const setSummaries = setNums.map(s => {
    const sg = games.filter(g => g.set === s);
    let h = 0, a = 0;
    for (let gi = 0; gi < sg.length; gi++) {
      const last = sg[gi].points[sg[gi].points.length - 1];
      if (!last) continue;
      const hasNext = gi < sg.length - 1 || s < setNums[setNums.length-1];
      const w = inferGameWinner(last.home_point, last.away_point, last.point_winner, hasNext);
      if (w === 'home') h++;
      else if (w === 'away') a++;
    }
    return { set: s, h, a, isLive: s === setNums[setNums.length - 1] };
  });

  const activeGames = games.filter(g => g.set === activeSet);
  const isLiveSet   = activeSet === setNums[setNums.length - 1];

  let runH = 0, runA = 0;
  const gameBlocks = activeGames.map((g, gi) => {
    const last = g.points[g.points.length - 1];
    const hasNext = gi < activeGames.length - 1 || !isLiveSet;
    const winner = last ? inferGameWinner(last.home_point, last.away_point, last.point_winner, hasNext) : null;
    if (winner === 'home') runH++;
    else if (winner === 'away') runA++;
    const sc = `${runH}–${runA}`;
    const srv = g.points[0]?.server;
    const isBreak = winner && srv && winner !== srv;
    const hasBP   = g.points.some(p => isBP(p));
    const hasGap  = g.points.some(p => p.has_gap === true);
    const aName = lastName(playerA);
    const bName = lastName(playerB);

    return (
      <div className="game-block" key={`${g.set}-${g.game}`}>
        <div className="game-block-inner">
          <span className="game-sc">{sc}</span>
          {hasGap && (
            <span className="gap-mark" title="Data gap — game winner inferred from match-detail score">~</span>
          )}
          <div className="pbp-names">
            <div className={srv === 'home' ? 'pbp-srv-row' : 'pbp-ret-row'}>
              {srv === 'home' ? <span className="srv-dot">●</span> : <span className="srv-sp"/>}
              <span className="pbp-name-txt">{aName}</span>
              {srv === 'home' && isBreak && <span className="bp-tag">Break</span>}
              {srv === 'home' && !isBreak && hasBP && <span className="bp-tag">BP</span>}
            </div>
            <div className="pbp-lbl-gap"/>
            <div className={srv === 'away' ? 'pbp-srv-row' : 'pbp-ret-row'}>
              {srv === 'away' ? <span className="srv-dot">●</span> : <span className="srv-sp"/>}
              <span className="pbp-name-txt">{bName}</span>
              {srv === 'away' && isBreak && <span className="bp-tag">Break</span>}
              {srv === 'away' && !isBreak && hasBP && <span className="bp-tag">BP</span>}
            </div>
          </div>
          <div className="pbp-pts">
            {g.points
              .filter(pt => !(String(pt.home_point) === '0' && String(pt.away_point) === '0'))
              .map((pt, pi) => {
              const homeWon = pt.point_winner === 'home';
              const awayWon = pt.point_winner === 'away';
              const isBPpt  = isBP(pt);
              const ptScA   = fmtPbpSc(pt.home_point);
              const ptScB   = fmtPbpSc(pt.away_point);
              return (
                <div className="pt-col2" key={pi}>
                  <div className="pt-cell">
                    {homeWon
                      ? <div className={`pt-score-sq pa${isBPpt ? ' bp-mark' : ''}`}>{ptScA}</div>
                      : <span className="pt-score-txt">{ptScA}</span>
                    }
                  </div>
                  <div className="pt-cell">
                    {awayWon
                      ? <div className={`pt-score-sq pb${isBPpt ? ' bp-mark' : ''}`}>{ptScB}</div>
                      : <span className="pt-score-txt">{ptScB}</span>
                    }
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  });

  return (
    <div className="dash-card">
      <div className="dash-card-hdr">
        <div className="dash-sec-lbl">Point by Point</div>
        <div className="set-tabs">
          {setSummaries.map(s => (
            <button key={s.set} className={`set-tab-btn${s.set === activeSet ? ' active' : ''}`}
                    onClick={() => setActiveSet(s.set)}>
              Set {s.set} · {s.h}–{s.a}{s.isLive ? ' ★' : ''}
            </button>
          ))}
        </div>
      </div>
      <div className="pbp-wrap">
        {gameBlocks}
        {isLiveSet && (
          <div className="pt-live-note">● Live — set in progress</div>
        )}
      </div>
    </div>
  );
}

function MatchStatsCard({ points, playerA, playerB }) {
  const stats = useMemo(() => computeMatchStats(points), [points]);
  if (!stats) return (
    <div className="dash-card">
      <div className="dash-card-hdr"><div className="dash-sec-lbl">Match Stats</div></div>
      <div className="empty-state" style={{padding:'24px 0',fontSize:'0.95rem'}}>No data yet.</div>
    </div>
  );
  const fmtPct  = (n, d) => d > 0 ? `${Math.round(n / d * 100)}%` : '—';
  const fmtFrac = (n, d) => d > 0 ? `${n}/${d} · ${fmtPct(n, d)}` : '—';
  const h = stats.home, a = stats.away;
  const rows = [
    ['Points won',         h.ptsWon,                                   a.ptsWon],
    ['Won on serve',       fmtFrac(h.serveWon,   h.servePtsTotal),     fmtFrac(a.serveWon,   a.servePtsTotal)],
    ['Won on return',      fmtFrac(h.returnWon,  h.returnPtsTotal),    fmtFrac(a.returnWon,  a.returnPtsTotal)],
    ['Service games won',  fmtFrac(h.svcHolds,   h.svcTotal),          fmtFrac(a.svcHolds,   a.svcTotal)],
    ['Break points won',   fmtFrac(h.bpRecvWon,  h.bpRecvFaced),       fmtFrac(a.bpRecvWon,  a.bpRecvFaced)],
    ['Break points saved', fmtFrac(h.bpSrvSaved, h.bpSrvFaced),        fmtFrac(a.bpSrvSaved, a.bpSrvFaced)],
    ['Serve streak',       h.serveStreak,                              a.serveStreak],
  ];
  return (
    <div className="dash-card">
      <div className="dash-card-hdr"><div className="dash-sec-lbl">Match Stats</div></div>
      {rows.map(([lbl, va, vb]) => (
        <div className="stat-r" key={lbl}>
          <div className="stat-lbl">{lbl}</div>
          <div className="stat-v a">{va}</div>
          <div className="stat-v b">{vb}</div>
        </div>
      ))}
    </div>
  );
}

function MatchDetail({ match, onBack }) {
  const [allPoints,  setAllPoints]  = useState([]);
  const [error,      setError]      = useState(null);
  const [scrubIdx,   setScrubIdx]   = useState(null);
  const [viewPlayer, setViewPlayer] = useState('A');
  const isScrubbing = scrubIdx !== null;
  const isFinal     = !!match.is_final || match.status === 'final';

  const fetchPoints = useCallback(async () => {
    try {
      const data = await fetch(`/match/${match.match_id}`).then(r => r.json());
      setAllPoints(deduplicatePoints(data));
    } catch(e) { setError(e.message); }
  }, [match.match_id]);

  useEffect(() => {
    fetchPoints();
    if (isScrubbing || isFinal) return;
    const id = setInterval(fetchPoints, 15_000);
    return () => clearInterval(id);
  }, [fetchPoints, isScrubbing, isFinal]);

  const visible     = isScrubbing ? allPoints.slice(0, scrubIdx+1) : allPoints;
  const enriched    = useMemo(() => enrichForPlayer(visible, viewPlayer), [visible, viewPlayer]);
  const latest      = visible[visible.length-1] ?? null;
  const playerA     = `${countryFlag(match.country_a) ? countryFlag(match.country_a) + ' ' : ''}${match.player_a ?? 'Home (A)'}`;
  const playerB     = `${countryFlag(match.country_b) ? countryFlag(match.country_b) + ' ' : ''}${match.player_b ?? 'Away (B)'}`;
  const latestScore = useMemo(() => deriveScoreFromColumns(visible), [visible]);

  return (
    <div className="dashboard-wrap">
      <div className="dash-page">
        <button className="dash-crumb" onClick={onBack}>← All matches</button>
        {error && <div className="error-banner">⚠ {error}</div>}

        {allPoints.length === 0 ? (
          <div className="empty-state">No data yet — waiting for points …</div>
        ) : (
          <>
            <HeroCard match={match} latest={latest} sc={latestScore}
                      viewPlayer={viewPlayer} setViewPlayer={setViewPlayer}
                      isScrubbing={isScrubbing} isFinal={isFinal}/>
            <MomentumBar latest={latest} playerA={playerA} playerB={playerB}/>
            <div className="dash-row">
              <div className="dash-card">
                <div className="dash-card-hdr">
                  <div className="dash-sec-lbl">Win Probability</div>
                  <div className="dash-toggle">
                    <button className={viewPlayer==='A' ? 'active' : ''} onClick={()=>setViewPlayer('A')}>{lastName(playerA)}</button>
                    <button className={viewPlayer==='B' ? 'active' : ''} onClick={()=>setViewPlayer('B')}>{lastName(playerB)}</button>
                  </div>
                </div>
                <div className="chart-wrap">
                  <ProbChart data={enriched} viewPlayer={viewPlayer} playerA={playerA} playerB={playerB}/>
                </div>
                <LiveScrubber total={allPoints.length} scrubIdx={scrubIdx}
                              onScrub={idx => setScrubIdx(idx)}
                              onLive={() => setScrubIdx(null)}/>
              </div>
              <SignalsCard latest={latest} playerA={playerA} playerB={playerB}/>
            </div>
            <div className="dash-row-2">
              <PointByPoint allPoints={visible} playerA={playerA} playerB={playerB}/>
              <MatchStatsCard points={visible} playerA={playerA} playerB={playerB}/>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ─── Root ───────────────────────────────────────────────────────────────────

function App() {
  const [tab, setTab] = useState('matches');
  const [selectedMatch, setSelectedMatch] = useState(null);

  const openMatch  = (m) => { setSelectedMatch(m); setTab('match'); };
  const closeMatch = ()  => { setTab('matches'); };

  const matchTabLabel = selectedMatch
    ? `${countryFlag(selectedMatch.country_a)}${lastName(selectedMatch.player_a)} · ${countryFlag(selectedMatch.country_b)}${lastName(selectedMatch.player_b)}`
    : null;

  return (
    <>
      <nav className="top-nav">
        <div className="nav-brand">
          <div className="emblem">T</div>
          Tennis Engine
        </div>
        <div className="live-badge"><div className="live-dot"/>Live · 15s</div>
        <div className="nav-tabs">
          <button className={`nav-tab${tab==='matches' ? ' active' : ''}`} onClick={()=>setTab('matches')}>
            Matches
          </button>
          {selectedMatch && (
            <button className={`nav-tab match-tab${tab==='match' ? ' active' : ''}`} onClick={()=>setTab('match')}>
              {matchTabLabel}
            </button>
          )}
        </div>
      </nav>
      <div className="stage">
        {/* MatchesTab is mounted always so its polling continues independent of tab. */}
        <div style={{display: tab === 'matches' ? 'block' : 'none', minHeight: '100%'}}>
          <MatchesTab active={tab === 'matches'} onSelect={openMatch}/>
        </div>
        {tab === 'match' && selectedMatch && (
          <MatchDetail match={selectedMatch} onBack={closeMatch}/>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
